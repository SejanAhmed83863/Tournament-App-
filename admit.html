<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Admin Panel - Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --orange: #FF6B00; --dark: #0A0A0F; --card: #12121A; --border: #2A2A3A; --text: #E8E8F0; --muted: #6B6B80; --green: #5CFF8A; --red: #FF6B6B; }
    body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; padding-bottom: 40px; }
    .header { background: var(--card); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; color: var(--orange); letter-spacing: 1px; }
    .tabs { display: flex; background: #1a1a24; padding: 5px; margin: 20px; border-radius: 8px; gap: 5px; overflow-x: auto; }
    .tab { flex: 1; min-width: 100px; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: 600; transition: 0.3s; color: var(--muted); white-space: nowrap; }
    .tab.active { background: var(--orange); color: white; }
    .tab-content { display: none; padding: 0 20px; }
    .tab-content.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    input, select { width: 100%; padding: 12px; margin-top: 8px; background: #1a1a24; border: 1px solid var(--border); color: white; border-radius: 6px; }
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-main { background: var(--orange); color: white; }
    .btn-prize { background: var(--green); color: black; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
    .bg-solo { background: rgba(255, 107, 0, 0.2); color: var(--orange); }
  </style>
</head>
<body>

  <div class="header">
    <h1>ADMIN DASHBOARD</h1>
    <button onclick="logOut()" style="width:auto; padding:5px 15px; background:none; border:1px solid var(--red); color:var(--red);">LOGOUT</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(event, 'requests')">REQUESTS</div>
    <div class="tab" onclick="switchTab(event, 'tournaments')">TOURNAMENTS</div>
    <div class="tab" onclick="switchTab(event, 'winners')">WINNERS</div>
  </div>

  <div id="tab-requests" class="tab-content active">
    <div id="requests-list"></div>
  </div>

  <div id="tab-tournaments" class="tab-content">
    <div class="card">
      <h3 style="color:var(--orange)">Add New Match</h3>
      <input type="text" id="t-title" placeholder="Match Title (e.g. Daily Solo)">
      <div style="display:flex; gap:10px">
        <input type="number" id="t-p1" placeholder="1st Prize">
        <input type="number" id="t-p2" placeholder="2nd Prize">
        <input type="number" id="t-p3" placeholder="3rd Prize">
      </div>
      <div style="display:flex; gap:10px">
        <input type="number" id="t-fee" placeholder="Entry Fee">
        <select id="t-type">
          <option value="1">Solo</option>
          <option value="2">Duo</option>
          <option value="4">Squad</option>
        </select>
      </div>
      <input type="datetime-local" id="t-time">
      <button class="btn-main" onclick="createTournament()">PUBLISH TOURNAMENT</button>
    </div>
    <div id="tournament-list"></div>
  </div>

  <div id="tab-winners" class="tab-content">
    <div class="card">
      <h3 style="color:var(--gold)">Distribute Prizes</h3>
      <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">Select match and enter winner UIDs</p>
      <select id="match-select"><option value="">Select Finished Match</option></select>
      <input type="number" id="w1" placeholder="1st Place UID (10 Digit)">
      <input type="number" id="w2" placeholder="2nd Place UID (10 Digit)">
      <input type="number" id="w3" placeholder="3rd Place UID (10 Digit)">
      <button class="btn-prize" onclick="distributePrizes()">SEND PRIZES & CLOSE MATCH</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, updateDoc, increment, getDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgMroBilivfk7bJxoz93HjxSt6yU7Ura0",
      authDomain: "tournament-app-4a050.firebaseapp.com",
      projectId: "tournament-app-4a050",
      storageBucket: "tournament-app-4a050.appspot.com",
      messagingSenderId: "811957533858", 
      appId: "1:811957533858:web:1d1f0f916c0aba5eccebfb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => { if(!user) window.location.href='index.html'; else initAdmin(); });

    function initAdmin() {
      loadRequests();
      loadTournaments();
    }

    // --- Tournament Adding Logic ---
    window.createTournament = async () => {
      const title = document.getElementById('t-title').value;
      const fee = Number(document.getElementById('t-fee').value);
      const type = Number(document.getElementById('t-type').value);
      const time = document.getElementById('t-time').value;
      const prizes = [
        Number(document.getElementById('t-p1').value),
        Number(document.getElementById('t-p2').value),
        Number(document.getElementById('t-p3').value)
      ];

      if(!title || !time || isNaN(fee)) return alert("Please fill all fields correctly!");

      try {
        await addDoc(collection(db, 'tournaments'), {
          title, fee, teamType: type, time, 
          prizes, status: 'active', createdAt: Date.now()
        });
        alert("Tournament Added! ✅");
        location.reload(); 
      } catch(e) { alert("Error: " + e.message); }
    };

    function loadTournaments() {
      const list = document.getElementById('tournament-list');
      const select = document.getElementById('match-select');
      
      onSnapshot(collection(db, 'tournaments'), snap => {
        list.innerHTML = '<h3 style="margin:20px 0 10px">All Matches</h3>';
        select.innerHTML = '<option value="">Select Match to Give Prize</option>';
        
        snap.forEach(d => {
          const t = d.data();
          list.innerHTML += `
            <div class="card">
              <span class="badge bg-solo">${t.teamType==1?'SOLO':t.teamType==2?'DUO':'SQUAD'}</span>
              <h4>${t.title}</h4>
              <p>Fee: ৳${t.fee} | Time: ${new Date(t.time).toLocaleString()}</p>
            </div>`;
          select.innerHTML += `<option value="${d.id}">${t.title}</option>`;
        });
      });
    }

    // --- Winner Prize Distribution Logic ---
    window.distributePrizes = async () => {
      const matchId = document.getElementById('match-select').value;
      const winners = [
        document.getElementById('w1').value,
        document.getElementById('w2').value,
        document.getElementById('w3').value
      ];

      if(!matchId || winners[0].length < 10) return alert("Select match and enter valid UIDs");

      try {
        const tSnap = await getDoc(doc(db, 'tournaments', matchId));
        const prizes = tSnap.data().prizes;

        for(let i=0; i<3; i++) {
          if(winners[i]) {
            // UID String এবং Number উভয় ফরম্যাটে চেক করার জন্য query
            const q = query(collection(db, 'users'), where('uid', 'in', [winners[i], Number(winners[i])]));
            const uSnap = await getDocs(q);
            uSnap.forEach(async (uDoc) => {
              await updateDoc(doc(db, 'users', uDoc.id), {
                balance: increment(prizes[i])
              });
            });
          }
        }
        
        // প্রাইজ ডিস্ট্রিবিউশন শেষে ম্যাচটি ডিলিট হবে
        await deleteDoc(doc(db, 'tournaments', matchId));
        alert("Prizes Sent & Match Removed! 🏆");
        location.reload();
      } catch(e) { alert("Distribution Failed: " + e.message); }
    };

    // Tab Switching
    window.switchTab = (e, tab) => {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      e.target.classList.add('active');
    };

    // Requests, Logout etc (Ager Motoi Rakhiben)
    window.logOut = () => signOut(auth);
    function loadRequests() { /* আপনার আগের রিকোয়েস্ট লোডিং কোড এখানে থাকবে */ }

  </script>
</body>
</html>
