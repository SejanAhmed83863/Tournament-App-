<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Admin Panel - Tournament App</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --orange: #FF6B00; --dark: #0A0A0F; --card: #12121A; --border: #2A2A3A; --text: #E8E8F0; --muted: #6B6B80; --green: #5CFF8A; --red: #FF6B6B; }
    body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; padding-bottom: 40px; }
    
    .header { background: var(--card); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; color: var(--orange); letter-spacing: 1px; }

    .tabs { display: flex; background: #1a1a24; padding: 5px; margin: 20px; border-radius: 8px; gap: 5px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: 600; transition: 0.3s; color: var(--muted); }
    .tab.active { background: var(--orange); color: white; }

    .tab-content { display: none; padding: 0 20px; }
    .tab-content.active { display: block; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
    .tx-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
    .tx-type.deposit { background: rgba(92, 255, 138, 0.2); color: var(--green); }
    .tx-type.withdraw { background: rgba(255, 107, 107, 0.2); color: var(--red); }
    
    .tx-email { font-weight: 700; color: var(--gold); }
    .tx-details { margin: 8px 0; color: var(--text); font-size: 14px; }
    .tx-actions { display: flex; gap: 10px; margin-top: 10px; }
    
    .btn-approve { background: var(--green); color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; }
    .btn-reject { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; }
    
    .empty-state { text-align: center; color: var(--muted); padding: 40px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>ADMIN PANEL</h1>
    <button onclick="logOut()" style="background:none; border:1px solid var(--orange); color:var(--orange); padding:5px 10px; border-radius:5px; cursor:pointer;">LOGOUT</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('requests')">REQUESTS</div>
    <div class="tab" onclick="switchTab('users')">USERS</div>
  </div>

  <div id="tab-requests" class="tab-content active">
    <div id="requests-list">
      <div class="empty-state">Loading pending requests...</div>
    </div>
  </div>

  <div id="tab-users" class="tab-content">
    <div id="users-list">
      <div class="empty-state">Loading users...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, increment, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    // ✅ Apnar Project ID use kore config fill-up kora hoyeche
    const firebaseConfig = {
      apiKey: "AIzaSyAs-ExampleKeyYourActualKey", // Obossoi Firebase Console theke asol key-ti boshaben
      authDomain: "tournament-app-4a050.firebaseapp.com",
      projectId: "tournament-app-4a050",
      storageBucket: "tournament-app-4a050.appspot.com",
      messagingSenderId: "542385108426", 
      appId: "1:542385108426:web:exampleid"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        initApp();
      }
    });

    function initApp() {
      loadTransactions();
      loadUsers();
    }

    function loadTransactions() {
      const list = document.getElementById('requests-list');
      // Collection name: 'transactions' check kora hobe
      const q = query(collection(db, 'transactions'), where('status', '==', 'pending'));

      onSnapshot(q, (snap) => {
        list.innerHTML = '';
        if (snap.empty) {
          list.innerHTML = '<div class="empty-state">No pending requests found!</div>';
          return;
        }

        snap.forEach(d => {
          const tx = d.data();
          const id = d.id;
          list.innerHTML += `
            <div class="card">
              <div class="tx-type ${tx.type}">${tx.type ? tx.type.toUpperCase() : 'UNKNOWN'}</div>
              <div class="tx-email">${tx.email || 'No Email'}</div>
              <div class="tx-details">
                <b>Amount:</b> ৳${tx.amount} <br>
                <b>Method:</b> ${tx.method} | <b>Number:</b> ${tx.number}
              </div>
              <div class="tx-actions">
                <button class="btn-approve" onclick="handleTx('${id}', '${tx.uid}', ${tx.amount}, '${tx.type}', 'approve')">Approve</button>
                <button class="btn-reject" onclick="handleTx('${id}', null, 0, null, 'reject')">Reject</button>
              </div>
            </div>`;
        });
      }, (err) => {
        list.innerHTML = '<div class="empty-state" style="color:red">Permission Denied! Check Firestore Rules.</div>';
      });
    }

    window.handleTx = async (txId, uid, amount, type, action) => {
      if (!confirm(`Are you sure you want to ${action}?`)) return;
      try {
        if (action === 'approve') {
          await updateDoc(doc(db, 'transactions', txId), { status: 'approved' });
          if (type === 'deposit' && uid) {
            await updateDoc(doc(db, 'users', uid), { balance: increment(amount) });
          }
          alert("Approved ✅");
        } else {
          await updateDoc(doc(db, 'transactions', txId), { status: 'rejected' });
          alert("Rejected ❌");
        }
      } catch (e) {
        alert("Error: " + e.message);
      }
    };

    function loadUsers() {
      const list = document.getElementById('users-list');
      onSnapshot(collection(db, 'users'), (snap) => {
        list.innerHTML = '';
        snap.forEach(d => {
          const u = d.data();
          list.innerHTML += `
            <div class="card">
              <div style="font-weight:bold; color:var(--gold)">${u.email}</div>
              <div style="font-size:14px">Balance: ৳${u.balance || 0}</div>
            </div>`;
        });
      });
    }

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    };

    window.logOut = () => signOut(auth).then(() => window.location.href = 'index.html');

  </script>
</body>
</html>
