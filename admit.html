<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Admin Panel - Tournament App</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --orange: #FF6B00; --dark: #0A0A0F; --card: #12121A; --border: #2A2A3A; --text: #E8E8F0; --muted: #6B6B80; --green: #5CFF8A; --red: #FF6B6B; }
    body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; padding-bottom: 40px; }
    .header { background: var(--card); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; color: var(--orange); letter-spacing: 1px; }
    .tabs { display: flex; background: #1a1a24; padding: 5px; margin: 20px; border-radius: 8px; gap: 5px; overflow-x: auto; }
    .tab { flex: 1; min-width: 100px; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: 600; transition: 0.3s; color: var(--muted); white-space: nowrap; }
    .tab.active { background: var(--orange); color: white; }
    .tab-content { display: none; padding: 0 20px; }
    .tab-content.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .tx-actions { display: flex; gap: 10px; margin-top: 10px; }
    .btn-approve { background: var(--green); color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; }
    .btn-reject { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; background: #1a1a24; border: 1px solid var(--border); color: white; border-radius: 6px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>ADMIN PANEL</h1>
    <button onclick="logOut()" style="background:none; border:1px solid var(--orange); color:var(--orange); padding:5px 10px; border-radius:5px; cursor:pointer;">LOGOUT</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(event, 'requests')">REQUESTS</div>
    <div class="tab" onclick="switchTab(event, 'tournaments')">TOURNAMENTS</div>
    <div class="tab" onclick="switchTab(event, 'winners')">WINNERS</div>
  </div>

  <div id="tab-requests" class="tab-content active">
    <div id="requests-list"></div>
  </div>

  <div id="tab-tournaments" class="tab-content">
    <div class="card">
      <h3 style="color:var(--orange)">Create Tournament</h3>
      <input type="text" id="t-title" placeholder="Match Title">
      <div style="display:flex; gap:10px">
        <input type="number" id="t-prize1" placeholder="1st Prize">
        <input type="number" id="t-prize2" placeholder="2nd Prize">
        <input type="number" id="t-prize3" placeholder="3rd Prize">
      </div>
      <div style="display:flex; gap:10px">
        <input type="number" id="t-fee" placeholder="Entry Fee (Per Person)">
        <select id="t-type">
          <option value="1">Solo</option>
          <option value="2">Duo</option>
          <option value="4">Squad</option>
        </select>
      </div>
      <input type="number" id="t-max" placeholder="Max Total Players">
      <input type="datetime-local" id="t-time">
      <button onclick="createTournament()" style="width:100%; padding:12px; background:var(--orange); border:none; color:white; font-weight:bold; border-radius:5px; cursor:pointer;">ADD TOURNAMENT</button>
    </div>
    <div id="tournament-list"></div>
  </div>

  <div id="tab-winners" class="tab-content">
    <div class="card">
      <h3 style="color:var(--gold)">Select Winners</h3>
      <select id="winner-match-select"><option value="">Select Match</option></select>
      <input type="text" id="w1" placeholder="1st Place UID">
      <input type="text" id="w2" placeholder="2nd Place UID">
      <input type="text" id="w3" placeholder="3rd Place UID">
      <button onclick="distributePrizes()" style="width:100%; padding:10px; background:var(--green); border:none; color:black; font-weight:bold; border-radius:5px;">DISTRIBUTE PRIZES & DELETE MATCH</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, updateDoc, increment, getDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgMroBilivfk7bJxoz93HjxSt6yU7Ura0",
      authDomain: "tournament-app-4a050.firebaseapp.com",
      projectId: "tournament-app-4a050",
      storageBucket: "tournament-app-4a050.appspot.com",
      messagingSenderId: "811957533858", 
      appId: "1:811957533858:web:1d1f0f916c0aba5eccebfb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = 'index.html';
      else { loadRequests(); loadTournaments(); }
    });

    // 1. Transaction Handle
    window.handleTx = async (id, uid, amt, type, action) => {
      try {
        if(action === 'approve') {
          await updateDoc(doc(db, 'transactions', id), { status: 'approved' });
          if(type === 'deposit') await updateDoc(doc(db, 'users', uid), { balance: increment(amt) });
          alert("Approved ✅");
        } else {
          await updateDoc(doc(db, 'transactions', id), { status: 'rejected' });
          if(type === 'withdraw') await updateDoc(doc(db, 'users', uid), { balance: increment(amt) });
          alert("Rejected & Refunded ❌");
        }
      } catch(e) { alert(e.message); }
    };

    // 2. Tournament Logic (FIXED)
    window.createTournament = async () => {
      const title = document.getElementById('t-title').value;
      const fee = Number(document.getElementById('t-fee').value);
      const type = Number(document.getElementById('t-type').value);
      const time = document.getElementById('t-time').value;

      if(!title || !time || isNaN(fee)) return alert("Please fill all fields!");

      await addDoc(collection(db, 'tournaments'), { 
        title, 
        prize1: Number(document.getElementById('t-prize1').value),
        prize2: Number(document.getElementById('t-prize2').value),
        prize3: Number(document.getElementById('t-prize3').value),
        fee: fee,
        teamType: type, 
        maxPlayers: Number(document.getElementById('t-max').value),
        joined: 0,
        time: time,
        status: 'open'
      });
      alert("Tournament Added! ✅");
    };

    function loadTournaments() {
      const list = document.getElementById('tournament-list');
      const select = document.getElementById('winner-match-select');
      onSnapshot(collection(db, 'tournaments'), (snap) => {
        list.innerHTML = '<h3>Active Matches</h3>';
        select.innerHTML = '<option value="">Select Match</option>';
         snap.forEach(d => {
          const t = d.data();
          list.innerHTML += `<div class="card"><b>${t.title}</b><br>Fee: ৳${t.fee} | Type: ${t.teamType==1?'Solo':t.teamType==2?'Duo':'Squad'}</div>`;
          select.innerHTML += `<option value="${d.id}">${t.title}</option>`;
        });
      });
    }

    // 3. Winner Prize logic (FIXED UID MATCHING)
    window.distributePrizes = async () => {
      const mId = document.getElementById('winner-match-select').value;
      const wUIDs = [
        document.getElementById('w1').value.trim(),
        document.getElementById('w2').value.trim(),
        document.getElementById('w3').value.trim()
      ];

      if(!mId) return alert("Select a match first!");

      const tSnap = await getDoc(doc(db, 'tournaments', mId));
      const t = tSnap.data();
      const prizes = [t.prize1, t.prize2, t.prize3];

      for(let i=0; i<3; i++) {
        if(wUIDs[i]) {
          // UID স্ট্রিং বা নাম্বার যাই হোক খুঁজে বের করবে
          const q = query(collection(db, 'users'), where('uid', 'in', [wUIDs[i], Number(wUIDs[i])]));
          const uSnap = await getDocs(q);
          uSnap.forEach(async (uDoc) => {
            await updateDoc(doc(db, 'users', uDoc.id), { balance: increment(prizes[i]) });
          });
        }
      }
      
      await deleteDoc(doc(db, 'tournaments', mId));
      alert("Prizes Distributed & Match Closed! 🏆");
    };

    function loadRequests() {
      onSnapshot(query(collection(db, 'transactions'), where('status', '==', 'pending')), (snap) => {
        const list = document.getElementById('requests-list');
        list.innerHTML = '';
        snap.forEach(d => {
          const tx = d.data();
          list.innerHTML += `<div class="card">
            <b>${tx.type.toUpperCase()}</b> | ${tx.email}<br>
            Amount: ৳${tx.amount} | Num: ${tx.number}
            <div class="tx-actions">
              <button class="btn-approve" onclick="handleTx('${d.id}', '${tx.uid}', ${tx.amount}, '${tx.type}', 'approve')">Approve</button>
              <button class="btn-reject" onclick="handleTx('${d.id}', '${tx.uid}', ${tx.amount}, '${tx.type}', 'reject')">Reject</button>
            </div>
          </div>`;
        });
      });
    }

    window.switchTab = (e, tab) => {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      e.target.classList.add('active');
    };
    window.logOut = () => signOut(auth);
  </script>
</body>
</html>
