<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Jahanabad Tournament Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--red:#ec1c24;--gold:#fecb00;--dark-gold:#b8860b;--dark:#000;--card:rgba(20,20,20,0.95);--border:#333;--text:#fff;--muted:#999}
    body{
      font-family:'Oswald',sans-serif;background:#0a0a0a;color:var(--text);min-height:100vh;padding-bottom:85px;
      background-image:linear-gradient(to bottom,rgba(0,0,0,0.82),rgba(0,0,0,0.95)),
      url('https://w0.peakpx.com/wallpaper/701/320/wallpaper-free-fire-logo-esports.jpg');
      background-size:cover;background-position:center;background-attachment:fixed;
    }

    /* HEADER */
    .header{
      background:linear-gradient(180deg,rgba(0,0,0,0.95),rgba(10,10,10,0.9));
      border-bottom:2px solid var(--gold);padding:10px 16px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .logo-wrap{display:flex;align-items:center;gap:10px}
    .logo-img{width:42px;height:42px;border-radius:6px;border:2px solid var(--gold);object-fit:cover}
    .logo-text{font-family:'Teko',sans-serif;line-height:1}
    .logo-text .line1{font-size:20px;color:var(--gold);text-shadow:1px 1px var(--red);letter-spacing:2px;text-transform:uppercase}
    .logo-text .line2{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
    .wallet-btn{
      background:linear-gradient(180deg,var(--red),#a01015);
      border:1px solid var(--gold);padding:6px 14px;border-radius:5px;
      font-family:'Teko';font-size:18px;color:var(--gold);cursor:pointer;letter-spacing:1px;
    }

    .content{padding:14px;max-width:500px;margin:0 auto}

    /* BANNER */
    .banner{
      border-radius:12px;overflow:hidden;margin-bottom:16px;position:relative;
      border:2px solid var(--gold);box-shadow:0 0 20px rgba(254,203,0,0.2);
    }
    .banner-img{width:100%;height:170px;object-fit:cover;opacity:0.5;display:block}
    .banner-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,0.97) 0%,rgba(0,0,0,0.3) 100%);
      display:flex;flex-direction:column;justify-content:flex-end;padding:16px;
    }
    .banner-club{font-family:'Teko',sans-serif;font-size:13px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:2px}
    .banner-title{font-family:'Teko',sans-serif;font-size:36px;color:#fff;text-transform:uppercase;text-shadow:2px 2px var(--red);letter-spacing:2px;line-height:1}
    .banner-title span{color:var(--gold)}
    .banner-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
    .banner-stats{display:flex;gap:14px;margin-top:8px}
    .b-stat{font-size:12px;color:var(--text);font-weight:500}
    .b-stat span{color:var(--gold);font-family:'Teko';font-size:16px}
    .booyah-tag{position:absolute;top:10px;right:10px;background:var(--gold);color:#000;font-family:'Teko';font-size:13px;padding:3px 8px;border-radius:4px;letter-spacing:1px}

    /* SECTION */
    .sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-left:3px solid var(--red);padding-left:10px}
    .sec-title{font-family:'Teko',sans-serif;font-size:20px;color:#fff;letter-spacing:2px;text-transform:uppercase}
    .sec-link{color:var(--gold);font-size:12px;font-weight:700;text-decoration:none;letter-spacing:1px;text-transform:uppercase}

    /* MINI TOURNAMENT CARD */
    .mini-card{
      background:var(--card);border:1px solid var(--border);border-radius:10px;
      padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;
      justify-content:space-between;cursor:pointer;transition:0.2s;text-decoration:none;
      border-left:3px solid var(--red);position:relative;overflow:hidden;
    }
    .mini-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--red),var(--gold),transparent)}
    .mini-card:active{transform:scale(0.98)}
    .mini-left{display:flex;align-items:center;gap:11px}
    .mini-icon{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,var(--red),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--gold)}
    .mini-name{font-family:'Teko',sans-serif;font-size:18px;color:#fff;letter-spacing:1px;margin-bottom:1px}
    .mini-meta{font-size:11px;color:var(--muted);letter-spacing:1px}
    .mini-right{text-align:right}
    .mini-prize{font-family:'Teko',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px}
    .mini-entry{font-size:11px;color:var(--muted)}
    .live-dot{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--gold);font-weight:700;margin-top:3px;letter-spacing:1px}
    .live-dot::before{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}

    /* TAGLINE */
    .tagline{text-align:center;font-family:'Teko',sans-serif;font-size:14px;color:var(--muted);letter-spacing:3px;padding:16px 0 8px;text-transform:uppercase}
    .tagline span{color:var(--gold)}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.97);border-top:2px solid var(--gold);display:flex;z-index:200}
    .nav-item{flex:1;padding:12px 8px;text-align:center;cursor:pointer;color:var(--muted);font-family:'Teko';font-size:13px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;transition:0.2s}
    .nav-item.active{color:var(--gold)}
    .nav-icon{font-size:22px}
    .nav-divider{width:1px;background:var(--border);margin:8px 0}
    .nav-item.active .nav-icon{filter:drop-shadow(0 0 6px rgba(254,203,0,0.7))}
  </style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <img class="logo-img" src="https://i.ibb.co/L5hY8hK/free-fire-battle-arena-poster.jpg" alt="Logo" onerror="this.style.display='none'"/>
    <div class="logo-text">
      <div class="line1">Jahanabad</div>
      <div class="line2">Tournament Club</div>
    </div>
  </div>
  <div class="wallet-btn" onclick="window.location.href='dashboard.html'">৳ <span id="nav-balance">0</span></div>
</div>

<div class="content">

  <!-- BANNER -->
  <div class="banner">
    <img class="banner-img" src="https://w0.peakpx.com/wallpaper/701/320/wallpaper-free-fire-logo-esports.jpg" alt="Banner"/>
    <div class="banner-overlay">
      <div class="banner-club">Jahanabad Tournament Club</div>
      <div class="banner-title">FREE <span>FIRE</span><br>TOURNAMENT</div>
      <div class="banner-sub">Play Fair · Play Hard · Win Glory</div>
      <div class="banner-stats">
        <div class="b-stat">🔥 Live: <span id="t-count">0</span></div>
        <div class="b-stat">👥 Players: <span id="p-count">0</span></div>
      </div>
    </div>
    <div class="booyah-tag">BOOYAH! 🏆</div>
  </div>

  <!-- LIVE TOURNAMENTS -->
  <div class="sec-head">
    <div class="sec-title">🔥 Live Tournaments</div>
    <a class="sec-link" href="tournaments.html">See All →</a>
  </div>
  <div id="live-list"><div class="empty-state">⏳ Loading...</div></div>

  <div class="tagline">PLAY HARD • STAY PRO • <span>BOOYAH!</span></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="window.location.href='home.html'">
    <span class="nav-icon">🏆</span>Tournaments
  </button>
  <div class="nav-divider"></div>
  <button class="nav-item" onclick="window.location.href='dashboard.html'">
    <span class="nav-icon">👤</span>Profile
  </button>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, getDocs, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey:"AIzaSyBgMroBilivfk7bJxoz93HjxSt6yU7Ura0", authDomain:"tournament-app-4a050.firebaseapp.com", projectId:"tournament-app-4a050", storageBucket:"tournament-app-4a050.firebasestorage.app", messagingSenderId:"811957533858", appId:"1:811957533858:web:1d1f0f916c0aba5eccebfb" };
  const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href='index.html'; return; }
    const snap=await getDoc(doc(db,'users',user.uid));
    if (snap.exists()) document.getElementById('nav-balance').textContent=snap.data().balance||0;
    await loadTournaments();
    const usersSnap=await getDocs(collection(db,'users'));
    document.getElementById('p-count').textContent=usersSnap.size;
  });

  async function loadTournaments() {
    const now=new Date();
    const snap=await getDocs(query(collection(db,'tournaments'),orderBy('time','asc')));
    const list=document.getElementById('live-list');
    const active=[];
    snap.forEach(d=>{
      const t=d.data();
      // Remove tournament 1 minute after start time
      if(t.status==='open'&&t.time){
        const startTime=new Date(t.time);
        const diff=(now-startTime)/1000/60; // minutes since start
        if(diff<1) active.push({id:d.id,...t});
      } else if(t.status==='open'&&!t.time){
        active.push({id:d.id,...t});
      }
    });
    document.getElementById('t-count').textContent=active.length;
    if(active.length===0){list.innerHTML='<div class="empty-state">🎮 No active tournaments right now.<br><span style="color:var(--gold)">Check back soon!</span></div>';return;}
    list.innerHTML='';
    active.slice(0,4).forEach(t=>{
      const mode=t.teamType==1?'Solo':t.teamType==2?'Duo':'Squad';
      const timeStr=t.time?new Date(t.time).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      list.innerHTML+=`
        <a class="mini-card" href="tournaments.html">
          <div class="mini-left">
            <div class="mini-icon">🎮</div>
            <div>
              <div class="mini-name">${t.title}</div>
              <div class="mini-meta">${mode} · ${timeStr}</div>
              <div class="live-dot">OPEN</div>
            </div>
          </div>
          <div class="mini-right">
            <div class="mini-prize">৳${t.prize1||0}</div>
            <div class="mini-entry">Entry: ৳${t.fee}</div>
            <div class="mini-entry">${t.joined||0}/${t.maxPlayers} slots</div>
          </div>
        </a>`;
    });
  }
</script>
</body>
</html>
