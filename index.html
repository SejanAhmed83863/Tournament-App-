<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FF Arena - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --orange: #FF6B00; --dark: #0A0A0F; --card: #12121A; --border: #2A2A3A; --text: #E8E8F0; --muted: #6B6B80; }
    body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,107,0,0.15) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,107,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,107,0,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 48px; display: block; margin-bottom: 8px; filter: drop-shadow(0 0 20px rgba(255,107,0,0.6)); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { filter: drop-shadow(0 0 20px rgba(255,107,0,0.6)); } 50% { filter: drop-shadow(0 0 35px rgba(255,215,0,0.8)); } }
    .logo h1 { font-family: 'Bebas Neue'; font-size: 42px; letter-spacing: 4px; background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .logo p { color: var(--muted); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--orange), var(--gold), transparent); }
    .tabs { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; margin-bottom: 28px; gap: 4px; }
    .tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-family: 'Rajdhani'; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 8px; cursor: pointer; transition: all 0.25s ease; }
    .tab.active { background: linear-gradient(135deg, var(--orange), #FF8C00); color: white; box-shadow: 0 4px 15px rgba(255,107,0,0.4); }
    .form { display: none; }
    .form.active { display: block; animation: fadeUp 0.3s ease both; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); font-family: 'Rajdhani'; font-size: 16px; font-weight: 600; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
    .field input::placeholder { color: var(--muted); font-weight: 400; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--orange), #FF8C00); color: white; font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 3px; cursor: pointer; margin-top: 8px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); font-family: 'Rajdhani'; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { border-color: var(--gold); background: rgba(255,215,0,0.05); }
    .btn-google svg { width: 20px; height: 20px; }
    .message { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; display: none; }
    .message.error { display: block; background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #FF6B6B; }
    .message.success { display: block; background: rgba(50,255,100,0.1); border: 1px solid rgba(50,255,100,0.3); color: #5CFF8A; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="logo-icon">🏆</span>
    <h1>FF Arena</h1>
    <p>Battle for Glory</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>
    <div class="form active" id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
      <button class="btn" onclick="loginEmail()">Enter Arena</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="message" id="login-msg"></div>
    </div>
    <div class="form" id="register-form">
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="Min 6 characters"/></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="reg-pass2" placeholder="Repeat password"/></div>
      <button class="btn" onclick="registerEmail()">Join Tournament</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="message" id="reg-msg"></div>
    </div>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyBgMroBilivfk7bJxoz93HjxSt6yU7Ura0", authDomain: "tournament-app-4a050.firebaseapp.com", projectId: "tournament-app-4a050", storageBucket: "tournament-app-4a050.firebasestorage.app", messagingSenderId: "811957533858", appId: "1:811957533858:web:1d1f0f916c0aba5eccebfb" };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  onAuthStateChanged(auth, async (user) => {
    if (user) { await ensureUserDoc(user); window.location.href = 'home.html'; }
  });

  async function ensureUserDoc(user) {
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) await setDoc(ref, { name: '', uid_game: '', email: user.email, balance: 0, played: 0, wins: 0, total_earned: 0 });
  }

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('login-form').classList.toggle('active', tab==='login');
    document.getElementById('register-form').classList.toggle('active', tab==='register');
  };
  function showMsg(id, msg, type) { const el=document.getElementById(id); el.textContent=msg; el.className=`message ${type}`; }
  window.loginEmail = async () => {
    const email=document.getElementById('login-email').value.trim(), pass=document.getElementById('login-pass').value;
    if(!email||!pass) return showMsg('login-msg','Please fill in all fields.','error');
    try { await signInWithEmailAndPassword(auth,email,pass); } catch(e) { showMsg('login-msg','Invalid email or password.','error'); }
  };
  window.registerEmail = async () => {
    const email=document.getElementById('reg-email').value.trim(), pass=document.getElementById('reg-pass').value, pass2=document.getElementById('reg-pass2').value;
    if(!email||!pass||!pass2) return showMsg('reg-msg','Please fill in all fields.','error');
    if(pass!==pass2) return showMsg('reg-msg','Passwords do not match!','error');
    if(pass.length<6) return showMsg('reg-msg','Password must be at least 6 characters.','error');
    try { await createUserWithEmailAndPassword(auth,email,pass); } catch(e) { showMsg('reg-msg',e.message.includes('email-already')?'Email already registered.':'Registration failed.','error'); }
  };
  window.loginGoogle = async () => {
    try { await signInWithPopup(auth,provider); } catch(e) { showMsg('login-msg','Google sign-in failed. Try again.','error'); }
  };
</script>
</body>
</html>
