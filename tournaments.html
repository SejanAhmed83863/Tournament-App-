<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Tournaments - FF Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --orange: #FF6B00; --dark: #0A0A0F; --card: #12121A; --border: #2A2A3A; --text: #E8E8F0; --muted: #6B6B80; --green: #5CFF8A; --red: #FF6B6B; }
    body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; padding-bottom: 100px; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,107,0,0.12) 0%, transparent 70%); }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.97); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 3px; background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .wallet-badge { background: linear-gradient(135deg, var(--orange), #FF8C00); padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 700; color: white; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,15,0.97); border-top: 1px solid var(--border); display: flex; z-index: 100; }
    .nav-item { flex: 1; padding: 12px 8px; text-align: center; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
    .nav-item.active { color: var(--orange); }
    .nav-item span { font-size: 20px; }

    .content { padding: 20px; max-width: 500px; margin: 0 auto; }

    /* HERO */
    .hero { text-align: center; margin-bottom: 24px; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--orange), var(--gold), transparent); }
    .hero h1 { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 4px; background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* FILTER */
    .filter-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
    .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Rajdhani'; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.2s; }
    .filter-btn.active { border-color: var(--orange); background: rgba(255,107,0,0.1); color: var(--orange); }

    /* TOURNAMENT CARD */
    .t-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 14px; overflow: hidden; position: relative; }
    .t-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--orange), var(--gold), transparent); }
    .t-card-body { padding: 18px; }
    .t-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .t-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 2px; }
    .t-mode { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; border: 1px solid var(--orange); color: var(--orange); }
    .t-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .t-info-item { background: rgba(255,255,255,0.03); padding: 8px 10px; border-radius: 8px; font-size: 12px; }
    .t-info-item .label { color: var(--muted); margin-bottom: 2px; }
    .t-info-item .value { font-weight: 700; color: var(--gold); }

    /* PRIZE ROW */
    .prize-row { display: flex; justify-content: space-around; text-align: center; background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.15); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
    .prize-item .prize-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .prize-item .prize-val { font-family: 'Bebas Neue'; font-size: 20px; color: var(--gold); }
    .prize-item.first .prize-val { font-size: 26px; color: var(--orange); }

    /* PROGRESS BAR */
    .progress-wrap { margin-bottom: 14px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--gold)); border-radius: 3px; transition: width 0.5s ease; }

    /* JOIN BUTTON */
    .btn-join { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--orange), #FF8C00); color: white; font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 3px; cursor: pointer; transition: 0.2s; }
    .btn-join:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-join:disabled { background: #333; color: var(--muted); cursor: not-allowed; transform: none; }
    .btn-joined { width: 100%; padding: 14px; border: 1px solid var(--green); border-radius: 10px; background: rgba(92,255,138,0.08); color: var(--green); font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 3px; cursor: default; }

    .empty-state { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 28px 24px; width: 100%; max-width: 500px; animation: slideUp 0.3s ease both; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 3px; background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
    .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .modal-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
    .modal-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); font-family: 'Rajdhani'; font-size: 16px; font-weight: 600; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
    .modal-input:focus { border-color: var(--orange); }
    .modal-input::placeholder { color: var(--muted); font-weight: 400; }
    .fee-box { background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.3); border-radius: 10px; padding: 14px; margin-bottom: 16px; text-align: center; }
    .fee-box .fee-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; letter-spacing: 2px; text-transform: uppercase; }
    .fee-box .fee-amount { font-family: 'Bebas Neue'; font-size: 36px; color: var(--orange); }
    .modal-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--orange), #FF8C00); color: white; font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 3px; cursor: pointer; margin-bottom: 10px; }
    .modal-cancel { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--muted); font-family: 'Rajdhani'; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    .msg { text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; margin-bottom: 10px; }
    .msg.error { display: block; background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: var(--red); }
    .msg.success { display: block; background: rgba(50,255,100,0.1); border: 1px solid rgba(50,255,100,0.3); color: var(--green); }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">🏆 Tournaments</div>
  <div class="wallet-badge">৳ <span id="nav-balance">0</span></div>
</nav>

<div class="content">
  <div class="hero">
    <h1>Battle Arena</h1>
    <p>Join tournaments · Win prizes · Become champion</p>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="filterTournaments('all', this)">All</button>
    <button class="filter-btn" onclick="filterTournaments('Solo', this)">Solo</button>
    <button class="filter-btn" onclick="filterTournaments('Duo', this)">Duo</button>
    <button class="filter-btn" onclick="filterTournaments('Squad', this)">Squad</button>
    <button class="filter-btn" onclick="filterTournaments('free', this)">Free</button>
  </div>

  <div id="tournament-list"><div class="empty-state">⏳ Loading tournaments...</div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item active" href="tournaments.html"><span>🏆</span>Tournaments</a>
  <a class="nav-item" href="dashboard.html"><span>👤</span>Profile</a>
</nav>

<!-- JOIN MODAL -->
<div class="modal-overlay" id="join-modal">
  <div class="modal">
    <div class="modal-title" id="join-modal-title">Join Tournament</div>
    <div class="modal-sub" id="join-modal-sub"></div>
    <div class="fee-box">
      <div class="fee-label">Entry Fee</div>
      <div class="fee-amount">৳ <span id="join-fee">0</span></div>
    </div>
    <div id="uid-inputs"></div>
    <span class="modal-label">WhatsApp Number</span>
    <input type="tel" class="modal-input" id="join-whatsapp" placeholder="01XXXXXXXXX"/>
    <div class="msg" id="join-msg"></div>
    <button class="modal-btn" onclick="confirmJoin()">Confirm & Pay</button>
    <button class="modal-cancel" onclick="document.getElementById('join-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, getDocs, addDoc, collection, query, orderBy, arrayUnion, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgMroBilivfk7bJxoz93HjxSt6yU7Ura0",
    authDomain: "tournament-app-4a050.firebaseapp.com",
    projectId: "tournament-app-4a050",
    storageBucket: "tournament-app-4a050.firebasestorage.app",
    messagingSenderId: "811957533858",
    appId: "1:811957533858:web:1d1f0f916c0aba5eccebfb"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let userBalance = 0;
  let allTournaments = [];
  let selectedTournament = null;
  let currentFilter = 'all';

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      userBalance = snap.data().balance || 0;
      document.getElementById('nav-balance').textContent = userBalance;
    }
    await loadTournaments();
  });

  async function loadTournaments() {
    const snap = await getDocs(query(collection(db, 'tournaments'), orderBy('created_at', 'desc')));
    allTournaments = [];
    snap.forEach(d => allTournaments.push({ id: d.id, ...d.data() }));
    renderTournaments(allTournaments);
  }

  function renderTournaments(list) {
    const container = document.getElementById('tournament-list');
    const active = list.filter(t => t.status === 'active');
    if (active.length === 0) { container.innerHTML = '<div class="empty-state">🎮 No active tournaments right now.<br>Check back soon!</div>'; return; }
    container.innerHTML = '';
    active.forEach(t => {
      const registered = t.registered?.length || 0;
      const maxPlayers = t.maxPlayers || 99;
      const progress = Math.min((registered / maxPlayers) * 100, 100);
      const isFull = registered >= maxPlayers;
      const hasJoined = t.registered?.includes(currentUser?.uid);
      const isFree = t.entry === 0;

      container.innerHTML += `
        <div class="t-card">
          <div class="t-card-body">
            <div class="t-top">
              <div class="t-name">${t.name}</div>
              <div class="t-mode">${t.mode}</div>
            </div>
            <div class="t-info">
              <div class="t-info-item"><div class="label">🗺️ Map</div><div class="value">${t.map}</div></div>
              <div class="t-info-item"><div class="label">⏰ Time</div><div class="value">${t.time}</div></div>
              <div class="t-info-item"><div class="label">📅 Date</div><div class="value">${t.date}</div></div>
              <div class="t-info-item"><div class="label">💵 Entry</div><div class="value">${isFree ? 'FREE' : '৳' + t.entry}</div></div>
            </div>
            <div class="prize-row">
              <div class="prize-item"><div class="prize-label">🥈 2nd</div><div class="prize-val">৳${t.prizes?.p2 || 0}</div></div>
              <div class="prize-item first"><div class="prize-label">🏆 1st</div><div class="prize-val">৳${t.prizes?.p1 || 0}</div></div>
              <div class="prize-item"><div class="prize-label">🥉 3rd</div><div class="prize-val">৳${t.prizes?.p3 || 0}</div></div>
            </div>
            <div class="progress-wrap">
              <div class="progress-label"><span>👥 Players</span><span>${registered}/${maxPlayers}</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            </div>
            ${hasJoined
              ? `<button class="btn-joined">✅ Already Joined</button>`
              : isFull
              ? `<button class="btn-join" disabled>🔒 Full</button>`
              : `<button class="btn-join" onclick="openJoin('${t.id}')">Join · ${isFree ? 'FREE' : '৳' + t.entry}</button>`
            }
          </div>
        </div>`;
    });
  }

  window.filterTournaments = (filter, btn) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let filtered = allTournaments;
    if (filter === 'free') filtered = allTournaments.filter(t => t.entry === 0);
    else if (filter !== 'all') filtered = allTournaments.filter(t => t.mode === filter);
    renderTournaments(filtered);
  };

  window.openJoin = async (tId) => {
    const t = allTournaments.find(x => x.id === tId);
    if (!t) return;
    selectedTournament = t;
    document.getElementById('join-modal-title').textContent = t.name;
    document.getElementById('join-modal-sub').textContent = `${t.mode} · ${t.map} · ${t.date} ${t.time}`;
    document.getElementById('join-fee').textContent = t.entry;

    const count = t.mode === 'Solo' ? 1 : t.mode === 'Duo' ? 2 : 4;
    let inputs = '';
    for (let i = 1; i <= count; i++) {
      inputs += `<span class="modal-label">Player ${i} Game UID</span><input type="text" class="modal-input uid-val" placeholder="Enter UID"/>`;
    }
    if (count > 1) {
      inputs = `<span class="modal-label">Team Name</span><input type="text" class="modal-input" id="team-name-input" placeholder="Your team name"/>` + inputs;
    }
    document.getElementById('uid-inputs').innerHTML = inputs;
    document.getElementById('join-modal').classList.add('open');
  };

  window.confirmJoin = async () => {
    const t = selectedTournament;
    if (!t) return;
    const whatsapp = document.getElementById('join-whatsapp').value.trim();
    const uids = Array.from(document.querySelectorAll('.uid-val')).map(i => i.value.trim());
    const teamName = document.getElementById('team-name-input')?.value?.trim() || '';

    if (uids.some(u => !u)) { showMsg('join-msg', 'Please fill all UID fields.', 'error'); return; }
    if (!whatsapp) { showMsg('join-msg', 'Please enter your WhatsApp number.', 'error'); return; }

    if (t.entry > 0) {
      if (userBalance < t.entry) { showMsg('join-msg', `Insufficient balance! You need ৳${t.entry} but have ৳${userBalance}.`, 'error'); return; }
    }

    // Deduct entry fee
    if (t.entry > 0) {
      await updateDoc(doc(db, 'users', currentUser.uid), { balance: increment(-t.entry) });
      await addDoc(collection(db, 'transactions'), { uid: currentUser.uid, email: currentUser.email, amount: t.entry, type: 'entry', status: 'approved', reason: t.name, created_at: serverTimestamp() });
      userBalance -= t.entry;
      document.getElementById('nav-balance').textContent = userBalance;
    }

    // Register player
    await updateDoc(doc(db, 'tournaments', t.id), { registered: arrayUnion(currentUser.uid) });

    // Save registration details
    await addDoc(collection(db, 'registrations'), {
      tournament_id: t.id, tournament_name: t.name,
      uid: currentUser.uid, email: currentUser.email,
      team_name: teamName, game_uids: uids, whatsapp,
      entry_paid: t.entry, created_at: serverTimestamp()
    });

    // Update played count
    await updateDoc(doc(db, 'users', currentUser.uid), { played: increment(1) });

    showMsg('join-msg', '🎉 Joined successfully! Check WhatsApp for room details.', 'success');
    setTimeout(() => { document.getElementById('join-modal').classList.remove('open'); loadTournaments(); }, 2500);
  };

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = 'msg ' + type;
  }
</script>
</body>
</html>
