<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Tournaments - Jahanabad TC</title>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--red:#ec1c24;--gold:#fecb00;--dark:#000;--card:rgba(20,20,20,0.97);--border:#333;--text:#fff;--muted:#999;--green:#5CFF8A}
    body{
      font-family:'Oswald',sans-serif;background:#0a0a0a;color:var(--text);min-height:100vh;padding-bottom:90px;
      background-image:linear-gradient(to bottom,rgba(0,0,0,0.88),rgba(0,0,0,0.97)),url('https://w0.peakpx.com/wallpaper/701/320/wallpaper-free-fire-logo-esports.jpg');
      background-size:cover;background-position:center;background-attachment:fixed;
    }

    /* HEADER */
    .header{background:linear-gradient(180deg,rgba(0,0,0,0.97),rgba(10,10,10,0.9));border-bottom:2px solid var(--gold);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-title{font-family:'Teko',sans-serif;font-size:26px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;text-shadow:1px 1px var(--red)}
    .wallet-badge{background:linear-gradient(180deg,var(--red),#a01015);border:1px solid var(--gold);padding:6px 14px;border-radius:5px;font-family:'Teko';font-size:18px;color:var(--gold);letter-spacing:1px}

    .content{padding:14px;max-width:500px;margin:0 auto}

    /* FILTER */
    .filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
    .filter-btn{padding:7px 16px;border-radius:5px;border:1px solid var(--border);background:rgba(0,0,0,0.5);color:var(--muted);font-family:'Teko';font-size:14px;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:0.2s;text-transform:uppercase}
    .filter-btn.active{border-color:var(--gold);background:rgba(254,203,0,0.1);color:var(--gold)}

    /* TOURNAMENT CARD - Poster Style */
    .t-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;position:relative;box-shadow:0 5px 20px rgba(0,0,0,0.6)}
    .t-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}
    .t-card-header{background:linear-gradient(135deg,rgba(236,28,36,0.3),rgba(254,203,0,0.1),rgba(0,0,0,0.5));padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
    .t-name{font-family:'Teko',sans-serif;font-size:22px;color:#fff;letter-spacing:2px;text-transform:uppercase;text-shadow:1px 1px var(--red)}
    .t-mode-badge{background:rgba(254,203,0,0.15);border:1px solid var(--gold);color:var(--gold);font-family:'Teko';font-size:13px;padding:3px 10px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
    .t-body{padding:14px 16px}

    /* INFO GRID - like the poster */
    .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
    .info-item{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:7px;padding:8px 10px;text-align:center}
    .info-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
    .info-value{font-family:'Teko',sans-serif;font-size:16px;color:var(--gold);letter-spacing:1px}

    /* PRIZE POOL - like the poster */
    .prize-pool{background:rgba(0,0,0,0.5);border:1px solid rgba(254,203,0,0.3);border-radius:8px;padding:12px;margin-bottom:12px}
    .prize-pool-title{font-family:'Teko',sans-serif;font-size:14px;color:var(--gold);letter-spacing:3px;text-align:center;margin-bottom:10px;text-transform:uppercase;border-bottom:1px solid rgba(254,203,0,0.2);padding-bottom:6px}
    .prize-row{display:flex;justify-content:space-around;text-align:center}
    .prize-item .p-label{font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:1px}
    .prize-item .p-val{font-family:'Teko',sans-serif;font-size:22px;letter-spacing:1px}
    .prize-item.first .p-val{font-size:28px;color:var(--gold);text-shadow:1px 1px var(--red)}
    .prize-item.second .p-val{color:#C0C0C0}
    .prize-item.third .p-val{color:#CD7F32}

    /* PROGRESS */
    .progress-wrap{margin-bottom:12px}
    .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
    .progress-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px;transition:width 0.5s ease}

    /* BUTTONS */
    .btn-join{width:100%;padding:13px;border:1px solid var(--gold);border-radius:7px;background:linear-gradient(180deg,var(--red),#a01015);color:var(--gold);font-family:'Teko';font-size:20px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;text-shadow:none}
    .btn-join:disabled{background:#222;color:#555;border-color:#333;cursor:not-allowed}
    .btn-joined{width:100%;padding:13px;border:1px solid var(--green);border-radius:7px;background:rgba(92,255,138,0.08);color:var(--green);font-family:'Teko';font-size:20px;letter-spacing:3px;cursor:default;text-transform:uppercase}
    .empty-state{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#111;border:1px solid var(--gold);border-radius:16px 16px 0 0;padding:22px 18px;width:100%;max-width:500px;animation:slideUp 0.3s ease both;border-top:3px solid var(--gold)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-title{font-family:'Teko',sans-serif;font-size:24px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;text-shadow:1px 1px var(--red)}
    .modal-sub{color:var(--muted);font-size:12px;margin-bottom:14px;letter-spacing:1px}
    .fee-box{background:rgba(236,28,36,0.1);border:1px solid rgba(236,28,36,0.4);border-radius:8px;padding:12px;margin-bottom:14px;text-align:center}
    .fee-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
    .fee-amount{font-family:'Teko',sans-serif;font-size:34px;color:var(--gold);text-shadow:1px 1px var(--red)}
    .m-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;display:block}
    .m-input{width:100%;background:#000;border:1px solid var(--border);padding:11px 13px;border-radius:7px;color:#fff;font-family:'Oswald';font-size:14px;outline:none;margin-bottom:12px;transition:border-color 0.2s}
    .m-input:focus{border-color:var(--gold)}
    .m-input::placeholder{color:#555}
    .m-btn{width:100%;padding:13px;border:1px solid var(--gold);border-radius:7px;background:linear-gradient(180deg,var(--red),#a01015);color:var(--gold);font-family:'Teko';font-size:20px;letter-spacing:2px;cursor:pointer;margin-bottom:10px;text-transform:uppercase}
    .m-cancel{width:100%;padding:11px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);font-family:'Oswald';font-size:14px;font-weight:700;cursor:pointer}
    .msg{text-align:center;padding:8px;border-radius:6px;font-size:13px;font-weight:600;display:none;margin-bottom:10px}
    .msg.error{display:block;background:rgba(255,50,50,0.1);border:1px solid rgba(255,50,50,0.3);color:#FF6B6B}
    .msg.success{display:block;background:rgba(92,255,138,0.1);border:1px solid rgba(92,255,138,0.3);color:var(--green)}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.97);border-top:2px solid var(--gold);display:flex;z-index:200}
    .nav-item{flex:1;padding:12px 8px;text-align:center;cursor:pointer;color:var(--muted);font-family:'Teko';font-size:13px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none}
    .nav-item.active{color:var(--gold)}
    .nav-icon{font-size:22px}
    .nav-divider{width:1px;background:var(--border);margin:8px 0}
    .nav-item.active .nav-icon{filter:drop-shadow(0 0 6px rgba(254,203,0,0.7))}

    /* TAGLINE */
    .tagline{text-align:center;font-family:'Teko';font-size:13px;color:var(--muted);letter-spacing:3px;padding:10px 0;text-transform:uppercase}
    .tagline span{color:var(--gold)}
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">🏆 Tournaments</div>
  <div class="wallet-badge">৳ <span id="nav-balance">0</span></div>
</div>

<div class="content">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterT('all',this)">All</button>
    <button class="filter-btn" onclick="filterT('1',this)">Solo</button>
    <button class="filter-btn" onclick="filterT('2',this)">Duo</button>
    <button class="filter-btn" onclick="filterT('4',this)">Squad</button>
    <button class="filter-btn" onclick="filterT('free',this)">Free</button>
  </div>
  <div id="tournament-list"><div class="empty-state">⏳ Loading tournaments...</div></div>
  <div class="tagline">PLAY HARD • STAY PRO • <span>BOOYAH!</span></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">🏆</span>Tournaments</button>
  <div class="nav-divider"></div>
  <button class="nav-item" onclick="window.location.href='dashboard.html'"><span class="nav-icon">👤</span>Profile</button>
</nav>

<!-- JOIN MODAL -->
<div class="modal-overlay" id="join-modal">
  <div class="modal">
    <div class="modal-title" id="join-title">Join Tournament</div>
    <div class="modal-sub" id="join-sub"></div>
    <div class="fee-box">
      <div class="fee-label">Entry Fee</div>
      <div class="fee-amount">৳ <span id="join-fee">0</span></div>
    </div>
    <div id="uid-inputs"></div>
    <span class="m-label">WhatsApp Number</span>
    <input type="tel" class="m-input" id="join-whatsapp" placeholder="01XXXXXXXXX"/>
    <div class="msg" id="join-msg"></div>
    <button class="m-btn" onclick="confirmJoin()">Confirm & Join</button>
    <button class="m-cancel" onclick="document.getElementById('join-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, getDocs, addDoc, collection, query, orderBy, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey:"AIzaSyBgMroBilivfk7bJxoz93HjxSt6yU7Ura0", authDomain:"tournament-app-4a050.firebaseapp.com", projectId:"tournament-app-4a050", storageBucket:"tournament-app-4a050.firebasestorage.app", messagingSenderId:"811957533858", appId:"1:811957533858:web:1d1f0f916c0aba5eccebfb" };

  const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app);
  let currentUser=null, userBalance=0, allTournaments=[], selectedT=null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href='index.html'; return; }
    currentUser=user;
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()){ userBalance=snap.data().balance||0; document.getElementById('nav-balance').textContent=userBalance; }
    await loadTournaments();
    // Refresh every minute to auto-remove expired tournaments
    setInterval(()=>renderTournaments(allTournaments), 60000);
  });

  async function loadTournaments() {
    const snap=await getDocs(query(collection(db,'tournaments'),orderBy('time','asc')));
    allTournaments=[];
    snap.forEach(d=>allTournaments.push({id:d.id,...d.data()}));
    renderTournaments(allTournaments);
  }

  function isExpired(t) {
    if(!t.time) return false;
    const startTime=new Date(t.time);
    const now=new Date();
    const diffMins=(now-startTime)/1000/60;
    return diffMins>=1; // Remove 1 minute after start
  }

  function modeLabel(v){return v==1?'SOLO':v==2?'DUO':'SQUAD';}

  function renderTournaments(list) {
    const container=document.getElementById('tournament-list');
    const active=list.filter(t=>t.status==='open'&&!isExpired(t));
    if(active.length===0){container.innerHTML='<div class="empty-state">🎮 No active tournaments right now.<br><span style="color:var(--gold)">Check back soon! BOOYAH!</span></div>';return;}
    container.innerHTML='';
    active.forEach(t=>{
      const joined=t.joined||0, max=t.maxPlayers||99;
      const fill=Math.min((joined/max)*100,100);
      const isFull=joined>=max;
      const isFree=t.fee===0;
      const mode=modeLabel(t.teamType);
      const timeStr=t.time?new Date(t.time).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';

      container.innerHTML+=`
        <div class="t-card">
          <div class="t-card-header">
            <div class="t-name">${t.title}</div>
            <div class="t-mode-badge">${mode}</div>
          </div>
          <div class="t-body">
            <div class="info-grid">
              <div class="info-item"><div class="info-label">⏰ Time</div><div class="info-value">${timeStr}</div></div>
              <div class="info-item"><div class="info-label">💵 Entry</div><div class="info-value">${isFree?'FREE':'৳'+t.fee}</div></div>
              <div class="info-item"><div class="info-label">🗺️ Mode</div><div class="info-value">${mode}</div></div>
              <div class="info-item"><div class="info-label">👥 Slots</div><div class="info-value">${joined}/${max}</div></div>
            </div>
            <div class="prize-pool">
              <div class="prize-pool-title">🏆 Prize Pool</div>
              <div class="prize-row">
                <div class="prize-item second"><div class="p-label">🥈 Runner Up</div><div class="p-val">৳${t.prize2||0}</div></div>
                <div class="prize-item first"><div class="p-label">🥇 Champion</div><div class="p-val">৳${t.prize1||0}</div></div>
                <div class="prize-item third"><div class="p-label">🥉 3rd Place</div><div class="p-val">৳${t.prize3||0}</div></div>
              </div>
            </div>
            <div class="progress-wrap">
              <div class="progress-label"><span>Players Joined</span><span>${joined}/${max}</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${fill}%"></div></div>
            </div>
            <button class="btn-join" onclick="openJoin('${t.id}')" ${isFull?'disabled':''}>
              ${isFull?'🔒 FULL':'JOIN · '+(isFree?'FREE':'৳'+t.fee)}
            </button>
          </div>
        </div>`;
    });
  }

  window.filterT = (filter, btn) => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let filtered=allTournaments;
    if(filter==='free') filtered=allTournaments.filter(t=>t.fee===0);
    else if(filter!=='all') filtered=allTournaments.filter(t=>String(t.teamType)===filter);
    renderTournaments(filtered);
  };

  window.openJoin = (tId) => {
    const t=allTournaments.find(x=>x.id===tId);
    if(!t) return;
    selectedT=t;
    document.getElementById('join-title').textContent=t.title;
    document.getElementById('join-sub').textContent=`${modeLabel(t.teamType)} · ${t.time?new Date(t.time).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):''}`;
    document.getElementById('join-fee').textContent=t.fee;
    const count=t.teamType||1;
    let inputs='';
    if(count>1) inputs+=`<span class="m-label">Team Name</span><input type="text" class="m-input" id="team-name-input" placeholder="Your team name"/>`;
    for(let i=1;i<=count;i++) inputs+=`<span class="m-label">Player ${i} Game UID</span><input type="text" class="m-input uid-val" placeholder="Enter Game UID"/>`;
    document.getElementById('uid-inputs').innerHTML=inputs;
    document.getElementById('join-modal').classList.add('open');
  };

  window.confirmJoin = async () => {
    const t=selectedT; if(!t) return;
    const whatsapp=document.getElementById('join-whatsapp').value.trim();
    const uids=Array.from(document.querySelectorAll('.uid-val')).map(i=>i.value.trim());
    const teamName=document.getElementById('team-name-input')?.value?.trim()||'';
    if(uids.some(u=>!u)){showMsg('join-msg','Please fill all UID fields.','error');return;}
    if(!whatsapp){showMsg('join-msg','Please enter your WhatsApp number.','error');return;}
    if(t.fee>0&&userBalance<t.fee){showMsg('join-msg',`Not enough balance! Need ৳${t.fee}, have ৳${userBalance}.`,'error');return;}

    if(t.fee>0){
      await updateDoc(doc(db,'users',currentUser.uid),{balance:increment(-t.fee)});
      await addDoc(collection(db,'transactions'),{uid:currentUser.uid,email:currentUser.email,amount:t.fee,type:'entry',status:'approved',reason:t.title,created_at:serverTimestamp()});
      userBalance-=t.fee;
      document.getElementById('nav-balance').textContent=userBalance;
    }

    await updateDoc(doc(db,'tournaments',t.id),{joined:increment(1)});

    // Save registration - this becomes history
    await addDoc(collection(db,'registrations'),{
      tournament_id:t.id, tournament_name:t.title,
      uid:currentUser.uid, email:currentUser.email,
      team_name:teamName, game_uids:uids, whatsapp,
      entry_paid:t.fee, created_at:serverTimestamp()
    });

    await updateDoc(doc(db,'users',currentUser.uid),{played:increment(1)});

    showMsg('join-msg','🎉 Joined! Admin will send room ID on WhatsApp. BOOYAH!','success');
    setTimeout(()=>{ document.getElementById('join-modal').classList.remove('open'); loadTournaments(); }, 2500);
  };

  function showMsg(id,msg,type){const el=document.getElementById(id);el.textContent=msg;el.className='msg '+type;}
</script>
</body>
</html>
